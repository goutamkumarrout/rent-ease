<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>RentEase</h1>
        <p>Furniture & Appliance Rental Platform</p>
    </header>

    <section class="products">
        <h2>Our Products</h2>

        <div class="product">
            <h3>Sofa</h3>
            <p>₹1500/month</p>
            <button onclick="rentItem('Sofa')">Rent Now</button>
        </div>

        <div class="product">
            <h3>Bed</h3>
            <p>₹1800/month</p>
            <button onclick="rentItem('Bed')">Rent Now</button>
        </div>

        <div class="product">
            <h3>Refrigerator</h3>
            <p>₹2000/month</p>
            <button onclick="rentItem('Refrigerator')">Rent Now</button>
        </div>

        <div class="product">
            <h3>Washing Machine</h3>
            <p>₹2200/month</p>
            <button onclick="rentItem('Washing Machine')">Rent Now</button>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
